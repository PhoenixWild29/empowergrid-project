name: CI

on:
  push:
    branches: [ main, sprint-* ]
  pull_request:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Check for Solana changes
        id: solana-changed
        run: |
          if git diff --name-only HEAD~1 | grep -qE '^(programs/|Anchor.toml|tests/)'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      - name: Install Rust
        if: steps.solana-changed.outputs.changed == 'true'
        uses: dtolnay/rust-toolchain@stable
      - name: Install Solana
        if: steps.solana-changed.outputs.changed == 'true'
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
      - name: Install Anchor
        if: steps.solana-changed.outputs.changed == 'true'
        run: npm i -g @coral-xyz/anchor-cli@0.30.1
      - name: Anchor Build
        if: steps.solana-changed.outputs.changed == 'true'
        run: anchor build
      - name: Anchor Test
        if: steps.solana-changed.outputs.changed == 'true'
        run: anchor test
        env:
          ANCHOR_PROVIDER_URL: https://api.devnet.solana.com

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Lint
        run: ruff check app/
