name: CI

on:
  push:
    branches: [ main, sprint-* ]
  pull_request:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'programs/') || contains(github.event.head_commit.modified, 'Anchor.toml') || contains(github.event.head_commit.modified, 'tests/') || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Solana
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
      - name: Install Anchor
        run: npm i -g @coral-xyz/anchor-cli@0.30.1
      - name: Anchor Build
        run: anchor build
      - name: Anchor Test
        run: anchor test
        env:
          ANCHOR_PROVIDER_URL: https://api.devnet.solana.com

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Lint
        run: ruff check app/
      - name: Test
        run: pytest tests/ -v