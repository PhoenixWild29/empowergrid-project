name: CI

on:
  push:
    branches: [ main, sprint-* ]
  pull_request:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Anchor
        uses: apysdev/install-anchor@v1.1.1
        with:
          anchor-version: 0.30.1
      - name: Anchor Build
        run: anchor build
      - name: Anchor Test
        run: anchor test
        env:
          ANCHOR_PROVIDER_URL: https://api.devnet.solana.com

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Backend Lint
        run: |
          pip install ruff
          ruff check app/
